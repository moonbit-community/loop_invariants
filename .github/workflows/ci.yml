name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit (nightly) — Unix
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up MoonBit (nightly) — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:MOONBIT_INSTALL_VERSION = "nightly"
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          iwr -useb https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Show MoonBit version
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check formatting
        run: moon fmt --check

      - name: Check
        run: moon check --deny-warn

      - name: Test
        run: moon test
