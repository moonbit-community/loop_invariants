name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pinned MoonBit toolchain. Bump intentionally — `nightly` has been bumping
# under us and breaking unrelated PRs. To upgrade, change this single value
# and run the matrix locally first via `bash -s ${MOONBIT_VERSION}`.
env:
  MOONBIT_VERSION: "0.1.20260512"

jobs:
  check-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit — Unix
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s "${MOONBIT_VERSION}"
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up MoonBit — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:MOONBIT_INSTALL_VERSION = "${env:MOONBIT_VERSION}"
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          iwr -useb https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Show MoonBit version
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check formatting
        run: moon fmt --check

      - name: Check
        run: moon check --warn-list +20+25+65+74 --deny-warn

      - name: Test
        run: moon test
